[project]
name = "recoverypilot-assistant"
version = "0.1.0"
description = "LangGraph assistant core for RecoveryPilot AI."
requires-python = ">=3.11"
dependencies = [
    "langchain-core>=0.3.0",
    "langgraph>=0.2.0",
    "pydantic>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/recoverypilot_assistant"]

