name: Bug report
description: Report incorrect or unexpected behavior.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can someone reproduce the issue?
    validations:
      required: true

